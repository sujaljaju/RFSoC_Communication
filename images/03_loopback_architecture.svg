<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .lw  { font-size: 13px; font-weight: 500; fill: #fff; }
      .lws { font-size: 11px; font-weight: 400; fill: rgba(255,255,255,0.82); }
      .side { font-size: 11px; fill: #555; }
      .cable-label { font-size: 12px; font-weight: 500; fill: #888; font-style: italic; }
      .arr  { stroke: #888; stroke-width: 1.5; fill: none; }
      .arr-r { stroke: #c0392b; stroke-width: 1.8; fill: none; }
      .arr-b { stroke: #2980b9; stroke-width: 1.8; fill: none; }
      @media (prefers-color-scheme: dark) { .side { fill: #888; } .cable-label { fill: #777; } }
    </style>
  </defs>

  <!-- Python / PS -->
  <rect x="200" y="20" width="280" height="52" rx="10" fill="#3c348f" stroke="#2a2468" stroke-width="0.5"/>
  <text class="lw" x="340" y="42" text-anchor="middle">Python (PYNQ)</text>
  <text class="lws" x="340" y="59" text-anchor="middle">send buffer · receive buffer · DMA handles</text>

  <!-- TX arrow down left -->
  <line x1="280" y1="72" x2="200" y2="116" class="arr-r" marker-end="url(#arrow)"/>
  <text class="side" x="168" y="100" fill="#c0392b">TX (MM2S)</text>

  <!-- RX arrow up right -->
  <line x1="400" y1="116" x2="480" y2="72" class="arr-b" marker-end="url(#arrow)"/>
  <text class="side" x="488" y="100" fill="#2980b9">RX (S2MM)</text>

  <!-- DMA -->
  <rect x="120" y="116" width="220" height="52" rx="10" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <text class="lw" x="230" y="138" text-anchor="middle">AXI DMA</text>
  <text class="lws" x="230" y="155" text-anchor="middle">MM2S + S2MM both active</text>

  <!-- Subset converter (RX path) -->
  <rect x="340" y="116" width="220" height="52" rx="10" fill="#0F6E56" stroke="#085041" stroke-width="0.5"/>
  <text class="lw" x="450" y="138" text-anchor="middle">axis_subset_converter</text>
  <text class="lws" x="450" y="155" text-anchor="middle">adapts ADC stream width for DMA</text>

  <!-- Arrow: DMA MM2S down to DAC -->
  <line x1="180" y1="168" x2="180" y2="240" class="arr-r" marker-end="url(#arrow)"/>
  <!-- Arrow: ADC up to subset -->
  <line x1="450" y1="240" x2="450" y2="168" class="arr-b" marker-end="url(#arrow)"/>

  <!-- RFDC DAC -->
  <rect x="80" y="240" width="220" height="52" rx="10" fill="#993C1D" stroke="#712B13" stroke-width="0.5"/>
  <text class="lw" x="190" y="262" text-anchor="middle">RFDC DAC — Tile 0</text>
  <text class="lws" x="190" y="279" text-anchor="middle">4.9152 GSPS → vout00</text>

  <!-- RFDC ADC -->
  <rect x="380" y="240" width="220" height="52" rx="10" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <text class="lw" x="490" y="262" text-anchor="middle">RFDC ADC — Tile 2</text>
  <text class="lws" x="490" y="279" text-anchor="middle">4.9152 GSPS ← vin2_01</text>

  <!-- DAC out to SMA -->
  <line x1="190" y1="292" x2="190" y2="336" class="arr-r" marker-end="url(#arrow)"/>

  <!-- SMA out box -->
  <rect x="100" y="336" width="180" height="36" rx="8" fill="#c0392b" stroke="#922b21" stroke-width="0.5"/>
  <text class="lw" x="190" y="358" text-anchor="middle" font-size="12">vout00 SMA (out)</text>

  <!-- SMA in box -->
  <rect x="400" y="336" width="180" height="36" rx="8" fill="#2471a3" stroke="#1a5276" stroke-width="0.5"/>
  <text class="lw" x="490" y="358" text-anchor="middle" font-size="12">vin2_01 SMA (in)</text>

  <!-- Cable connecting the two SMAs -->
  <path d="M280 354 Q340 354 400 354" stroke="#888" stroke-width="2" stroke-dasharray="6 4" fill="none"/>
  <text class="cable-label" x="340" y="346" text-anchor="middle">SMA loopback cable</text>

  <!-- ADC in from SMA -->
  <line x1="490" y1="336" x2="490" y2="292" class="arr-b" marker-end="url(#arrow)"/>

  <!-- SmartConnect note -->
  <rect x="540" y="148" width="120" height="44" rx="8" fill="none" stroke="#aaa" stroke-width="0.7" stroke-dasharray="4 3"/>
  <text class="side" x="600" y="167" text-anchor="middle">axi_smc merges</text>
  <text class="side" x="600" y="183" text-anchor="middle">TX+RX to HP port</text>
  <line x1="562" y1="168" x2="514" y2="168" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3 3" fill="none" marker-end="url(#arrow)"/>

  <!-- Physical req note -->
  <text class="side" x="340" y="415" text-anchor="middle" font-style="italic">Physical requirement: SMA coaxial cable connecting vout00 → vin2_01</text>
</svg>
