<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .lw  { font-size: 13px; font-weight: 500; fill: #fff; }
      .lws { font-size: 11px; font-weight: 400; fill: rgba(255,255,255,0.82); }
      .side { font-size: 11px; fill: #555; }
      .arr   { stroke: #888; stroke-width: 1.5; fill: none; }
      .arr-r { stroke: #c0392b; stroke-width: 1.8; fill: none; }
      .arr-b { stroke: #2980b9; stroke-width: 1.8; fill: none; }
      @media (prefers-color-scheme: dark) { .side { fill: #888; } }
    </style>
  </defs>

  <!-- TX path label -->
  <text class="side" x="40" y="50" font-weight="600" fill="#c0392b">TX PATH</text>
  <!-- RX path label -->
  <text class="side" x="40" y="290" font-weight="600" fill="#2980b9">RX PATH</text>

  <!-- Python -->
  <rect x="200" y="30" width="280" height="44" rx="10" fill="#3c348f" stroke="#2a2468" stroke-width="0.5"/>
  <text class="lw" x="340" y="48" text-anchor="middle">Python (PYNQ)</text>
  <text class="lws" x="340" y="64" text-anchor="middle">send 16-bit words · read decoded bits</text>

  <!-- TX arrow -->
  <line x1="260" y1="74" x2="200" y2="110" class="arr-r" marker-end="url(#arrow)"/>
  <!-- RX arrow -->
  <line x1="420" y1="390" x2="480" y2="354" class="arr-b" marker-end="url(#arrow)"/>

  <!-- ASK Modulator -->
  <rect x="80" y="110" width="220" height="52" rx="10" fill="#854F0B" stroke="#633806" stroke-width="0.5"/>
  <text class="lw" x="190" y="132" text-anchor="middle">ask_modulator HLS IP</text>
  <text class="lws" x="190" y="149" text-anchor="middle">16-bit → 8 symbols → 2×128-bit</text>

  <line x1="190" y1="162" x2="190" y2="198" class="arr-r" marker-end="url(#arrow)"/>
  <text class="side" x="202" y="184">128-bit AXI-Stream</text>

  <!-- FIFO -->
  <rect x="80" y="198" width="220" height="44" rx="10" fill="#27ae60" stroke="#1e8449" stroke-width="0.5"/>
  <text class="lw" x="190" y="216" text-anchor="middle">axis_data_fifo</text>
  <text class="lws" x="190" y="232" text-anchor="middle">clock-domain buffer</text>

  <line x1="190" y1="242" x2="190" y2="278" class="arr-r" marker-end="url(#arrow)"/>

  <!-- RFDC DAC -->
  <rect x="80" y="278" width="220" height="44" rx="10" fill="#993C1D" stroke="#712B13" stroke-width="0.5"/>
  <text class="lw" x="190" y="296" text-anchor="middle">RFDC DAC — Tile 0</text>
  <text class="lws" x="190" y="312" text-anchor="middle">4.9152 GSPS → vout00</text>

  <!-- SMA out -->
  <line x1="190" y1="322" x2="190" y2="358" class="arr-r" marker-end="url(#arrow)"/>
  <rect x="100" y="358" width="180" height="30" rx="8" fill="#c0392b" stroke="#922b21" stroke-width="0.5"/>
  <text class="lw" x="190" y="377" text-anchor="middle" font-size="12">vout00 SMA</text>

  <!-- SMA cable -->
  <path d="M280 373 Q340 400 400 373" stroke="#888" stroke-width="2" stroke-dasharray="6 4" fill="none"/>
  <text class="side" x="340" y="415" text-anchor="middle" font-style="italic">SMA loopback cable</text>

  <!-- SMA in -->
  <rect x="400" y="358" width="180" height="30" rx="8" fill="#2471a3" stroke="#1a5276" stroke-width="0.5"/>
  <text class="lw" x="490" y="377" text-anchor="middle" font-size="12">vin2_01 SMA</text>

  <!-- RFDC ADC -->
  <line x1="490" y1="358" x2="490" y2="322" class="arr-b" marker-end="url(#arrow)"/>
  <rect x="380" y="278" width="220" height="44" rx="10" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <text class="lw" x="490" y="296" text-anchor="middle">RFDC ADC — Tile 2</text>
  <text class="lws" x="490" y="312" text-anchor="middle">4.9152 GSPS ← vin2_01</text>

  <line x1="490" y1="278" x2="490" y2="242" class="arr-b" marker-end="url(#arrow)"/>

  <!-- ASK Demodulator -->
  <rect x="380" y="198" width="220" height="44" rx="10" fill="#854F0B" stroke="#633806" stroke-width="0.5"/>
  <text class="lw" x="490" y="216" text-anchor="middle">ask_demodulator HLS IP</text>
  <text class="lws" x="490" y="232" text-anchor="middle">threshold detection → 16-bit output</text>

  <line x1="490" y1="198" x2="490" y2="162" class="arr-b" marker-end="url(#arrow)"/>

  <!-- Subset converter -->
  <rect x="380" y="110" width="220" height="52" rx="10" fill="#0F6E56" stroke="#085041" stroke-width="0.5"/>
  <text class="lw" x="490" y="132" text-anchor="middle">axis_subset_converter</text>
  <text class="lws" x="490" y="149" text-anchor="middle">width adaptation for DMA S2MM</text>

  <!-- Clock domains note -->
  <rect x="10" y="198" width="60" height="44" rx="6" fill="none" stroke="#c0392b" stroke-width="0.7" stroke-dasharray="4 3"/>
  <text class="side" x="40" y="215" text-anchor="middle" fill="#c0392b">DAC clk</text>
  <text class="side" x="40" y="232" text-anchor="middle" fill="#c0392b">~307 MHz</text>

  <rect x="610" y="198" width="60" height="44" rx="6" fill="none" stroke="#2980b9" stroke-width="0.7" stroke-dasharray="4 3"/>
  <text class="side" x="640" y="215" text-anchor="middle" fill="#2980b9">ADC clk</text>
  <text class="side" x="640" y="232" text-anchor="middle" fill="#2980b9">separate</text>
</svg>
