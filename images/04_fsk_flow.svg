<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .lw  { font-size: 13px; font-weight: 500; fill: #fff; }
      .lws { font-size: 11px; font-weight: 400; fill: rgba(255,255,255,0.82); }
      .side { font-size: 11px; fill: #555; }
      .map-label { font-size: 12px; font-weight: 500; fill: #333; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; }
      @media (prefers-color-scheme: dark) {
        .side { fill: #888; }
        .map-label { fill: #ccc; }
      }
    </style>
  </defs>

  <!-- Binary input -->
  <rect x="200" y="20" width="280" height="44" rx="10" fill="#3c348f" stroke="#2a2468" stroke-width="0.5"/>
  <text class="lw" x="340" y="38" text-anchor="middle">Binary input</text>
  <text class="lws" x="340" y="54" text-anchor="middle">"00011011..." → split into 2-bit symbols</text>

  <line x1="340" y1="64" x2="340" y2="96" class="arr" marker-end="url(#arrow)"/>

  <!-- Symbol mapping table -->
  <rect x="170" y="96" width="340" height="80" rx="10" fill="#854F0B" stroke="#633806" stroke-width="0.5"/>
  <text class="lw" x="340" y="116" text-anchor="middle">NCO frequency mapping</text>
  <!-- 4 symbol boxes -->
  <rect x="185" y="126" width="68" height="36" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text class="lw" x="219" y="140" text-anchor="middle" font-size="12">00</text>
  <text class="lws" x="219" y="155" text-anchor="middle">100 MHz</text>

  <rect x="263" y="126" width="68" height="36" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text class="lw" x="297" y="140" text-anchor="middle" font-size="12">01</text>
  <text class="lws" x="297" y="155" text-anchor="middle">200 MHz</text>

  <rect x="341" y="126" width="68" height="36" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text class="lw" x="375" y="140" text-anchor="middle" font-size="12">10</text>
  <text class="lws" x="375" y="155" text-anchor="middle">300 MHz</text>

  <rect x="419" y="126" width="68" height="36" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text class="lw" x="453" y="140" text-anchor="middle" font-size="12">11</text>
  <text class="lws" x="453" y="155" text-anchor="middle">400 MHz</text>

  <line x1="340" y1="176" x2="340" y2="208" class="arr" marker-end="url(#arrow)"/>
  <text class="side" x="352" y="196">update NCO → DAC → SMA cable → ADC</text>

  <!-- ADC capture & FFT -->
  <rect x="170" y="208" width="340" height="52" rx="10" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <text class="lw" x="340" y="230" text-anchor="middle">ADC capture + FFT analysis</text>
  <text class="lws" x="340" y="247" text-anchor="middle">Blackman-Harris window · find peak frequency</text>

  <line x1="340" y1="260" x2="340" y2="292" class="arr" marker-end="url(#arrow)"/>

  <!-- Decode -->
  <rect x="170" y="292" width="340" height="52" rx="10" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="lw" x="340" y="314" text-anchor="middle">Frequency → bits decoder</text>
  <text class="lws" x="340" y="331" text-anchor="middle">snap to nearest target → recover 2-bit symbol</text>

  <!-- Result badge -->
  <rect x="248" y="358" width="184" height="22" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="0.5"/>
  <text class="lw" x="340" y="373" text-anchor="middle" font-size="12">100% bit accuracy achieved</text>
  <line x1="340" y1="344" x2="340" y2="358" class="arr" marker-end="url(#arrow)" stroke="#27ae60"/>
</svg>
